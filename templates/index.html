<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EmoTunes — Emotion-Powered Music</title>
  <meta name="description" content="Real-time emotion detection that curates the perfect music for your mood.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <!-- Animated background -->
  <div class="bg-canvas">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="app-wrapper">

    <!-- ── Header ─────────────────────────────────────── -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">🎵</div>
        <span>Emo<span class="gradient-text">Tunes</span></span>
      </div>

      <div class="emotion-pill" id="emotion-pill">
        <div class="live-ring"></div>
        <span id="header-emoji">😐</span>
        <span id="header-emotion-text">Detecting...</span>
      </div>

      <button class="btn-ghost" id="reset-chat-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="1 4 1 10 7 10"></polyline>
          <path d="M3.51 15a9 9 0 1 0 .49-3.51"></path>
        </svg>
        Reset Chat
      </button>
    </header>

    <!-- ── 3-Panel Grid ───────────────────────────────── -->
    <main class="main-grid">

      <!-- LEFT: Live Detection -->
      <aside class="panel panel-left" id="panel-left">
        <div class="panel-header">
          <div class="panel-title-row">
            <h2>Live Detection</h2>
            <div class="live-badge">
              <div class="live-dot"></div>LIVE
            </div>
          </div>
        </div>

        <div class="camera-frame">
          <video id="webcam-video" class="camera-img" autoplay playsinline muted></video>
          <canvas id="frame-canvas" style="display: none;"></canvas>
          <div class="camera-overlay">
            <div class="scan-line"></div>
          </div>
        </div>

        <!-- Emotion Display -->
        <div class="emotion-display" id="emotion-display">
          <div class="emotion-color-strip" id="emotion-color-strip"></div>
          <span id="main-emotion-emoji" class="main-emoji">😐</span>
          <div class="emotion-info">
            <div class="emotion-name" id="main-emotion-name">Neutral</div>
            <div class="emotion-source" id="emotion-source">Camera AI</div>
          </div>
        </div>

        <!-- History -->
        <div class="history-section">
          <div class="history-label">Emotion history</div>
          <div class="history-dots" id="history-dots"></div>
        </div>
      </aside>

      <!-- CENTER: Song Recommendations -->
      <section class="panel panel-center" id="panel-center">
        <div class="panel-header">
          <div class="panel-title-row">
            <h2>Your Vibe Playlist</h2>
            <span class="track-badge" id="track-count">— tracks</span>
          </div>
          <div class="playlist-meta">
            <span class="playlist-emotion-pill" id="playlist-emotion-pill">🎵 Tuned to your mood</span>
          </div>
        </div>

        <div class="songs-container" id="songs-container">
          <div class="loading-state">
            <div class="loading-spinner"></div>
            <p>Detecting your mood...</p>
          </div>
        </div>
      </section>

      <!-- RIGHT: AI Mood Agent -->
      <aside class="panel panel-right" id="panel-right">
        <div class="panel-header">
          <div class="panel-title-row">
            <h2>AI Mood Agent</h2>
            <span style="font-size:20px">🤖</span>
          </div>
          <p class="panel-subtitle">Tell me how you feel and I'll tune your music</p>
        </div>

        <div class="chat-messages" id="chat-messages"></div>

        <div class="chat-input-area">
          <div class="chat-input-wrap">
            <input type="text" id="chat-input"
                   placeholder="How are you feeling..."
                   autocomplete="off" maxlength="200">
            <button class="send-btn" id="chat-send">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2.5">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
              </svg>
            </button>
          </div>

          <div class="quick-replies">
            <span class="qr-chip" onclick="sendQuickReply('I feel really happy today!')">😄 Happy</span>
            <span class="qr-chip" onclick="sendQuickReply('I am feeling sad and low')">😢 Sad</span>
            <span class="qr-chip" onclick="sendQuickReply('I am stressed and anxious')">😨 Anxious</span>
            <span class="qr-chip" onclick="sendQuickReply('I am angry and frustrated')">😠 Angry</span>
            <span class="qr-chip" onclick="sendQuickReply('Just feeling okay, nothing special')">😐 Neutral</span>
          </div>
        </div>
      </aside>

    </main>
  </div>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
